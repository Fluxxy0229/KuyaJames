<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, Kuya James!</title>
  <link rel="stylesheet" href="final.css" />
</head>

<body>

  <audio autoplay loop>
    <source src="hbd.mp3" type="audio/mpeg" />
  </audio>

  <div class="hearts"></div>

  <div class="container">
    <h1 id="typing"></h1>

    <div class="carousel">
      <button class="carousel-btn prev" aria-label="Previous image">❮</button>
      <div class="carousel-track">
        <img src="james1.jpg" alt="James 1">
        <img src="james2.jpg" alt="James 2">
        <img src="james3.jpg" alt="James 3">
        <img src="james4.jpg" alt="James 4">
      </div>
      <button class="carousel-btn next" aria-label="Next image">❯</button>
      
      <div class="carousel-dots">
        <span class="dot active" data-slide="0"></span>
        <span class="dot" data-slide="1"></span>
        <span class="dot" data-slide="2"></span>
        <span class="dot" data-slide="3"></span>
      </div>
    </div>
  </div>

<script>
const message =
"Happy 21st Birthday Kuya James! 🎂🎉 May this year bring you success, happiness, and everything you deserve.";

let i = 0;

function typeEffect() {
  if (i < message.length) {
    document.getElementById("typing").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeEffect, 50);
  } else {
    setTimeout(showThankYou, 10000);
  }
}

function showThankYou() {
  document.getElementById("thankyou").classList.add("show");
}

typeEffect();
</script>

<script>
const track = document.querySelector(".carousel-track");
const images = document.querySelectorAll(".carousel-track img");
const dots = document.querySelectorAll(".dot");
const prevBtn = document.querySelector(".carousel-btn.prev");
const nextBtn = document.querySelector(".carousel-btn.next");

let currentSlide = 0;
const totalSlides = images.length;

function updateCarousel() {
  images.forEach((img, index) => {
    img.classList.remove("active", "prev", "next");
    
    if (index === currentSlide) {
      img.classList.add("active");
    } else if (index === (currentSlide - 1 + totalSlides) % totalSlides) {
      img.classList.add("prev");
    } else if (index === (currentSlide + 1) % totalSlides) {
      img.classList.add("next");
    }
  });

  dots.forEach((dot, index) => {
    dot.classList.toggle("active", index === currentSlide);
  });
}

function nextSlide() {
  currentSlide = (currentSlide + 1) % totalSlides;
  updateCarousel();
}

function prevSlide() {
  currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
  updateCarousel();
}

if (nextBtn) nextBtn.addEventListener("click", nextSlide);
if (prevBtn) prevBtn.addEventListener("click", prevSlide);

dots.forEach(dot => {
  dot.addEventListener("click", (e) => {
    currentSlide = parseInt(e.target.dataset.slide);
    updateCarousel();
  });
});

const carousel = document.querySelector(".carousel");

let autoplayInterval = setInterval(nextSlide, 3000);

carousel.addEventListener("mouseenter", () => clearInterval(autoplayInterval));
carousel.addEventListener("mouseleave", () => {
  autoplayInterval = setInterval(nextSlide, 3000);
});

updateCarousel();
</script>

<script>
const heartContainer = document.querySelector(".hearts");

for (let i = 0; i < 25; i++) {
  const heart = document.createElement("span");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = 6 + Math.random() * 6 + "s";
  heart.style.fontSize = 15 + Math.random() * 20 + "px";
  heartContainer.appendChild(heart);
}
</script>

</body>

</html>
